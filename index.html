<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC MATRIX | Oasis Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* THE MASTER ARC THEME */
    body {
      background-color: #021c10;
      background-image: 
        linear-gradient(#032b18 1px, transparent 1px),
        linear-gradient(90deg, #032b18 1px, transparent 1px);
      background-size: 60px 60px;
      color: #e5e7eb;
      margin: 0;
      overflow: hidden; /* Locks the app frame */
    }
    
    /* Luxury Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D4AF37; }

    /* Web App State Classes */
    .app-view { display: none; height: 100%; width: 100%; position: relative; }
    .app-view.active { display: block; }
    
    /* Seamless Iframe Container */
    .app-frame { width: 100%; height: 100%; border: none; position: absolute; inset: 0; background-color: #010a05; }
  </style>
</head>
<body class="antialiased font-sans h-screen w-screen flex flex-col md:flex-row border-4 border-[#D4AF37]">

  <aside class="w-full md:w-80 bg-[#01140b]/95 backdrop-blur-md border-b md:border-b-0 md:border-r border-[#D4AF37] flex flex-col justify-between p-6 z-20">
    <div>
      <div class="mb-10 text-center md:text-left">
        <h1 class="text-4xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-[#FFFDD0] via-[#D4AF37] to-[#AA7C11] drop-shadow-[0_0_10px_rgba(212,175,55,0.3)]">
          ARC
        </h1>
        <p class="text-[11px] text-green-400 tracking-[0.4em] font-mono mt-1 uppercase font-bold">OASIS COMMAND v1.0</p>
      </div>

      <nav class="space-y-3">
        <button onclick="switchView('home')" id="btn-home" class="nav-btn w-full flex items-center space-x-4 px-4 py-3 rounded-none font-mono text-xs tracking-wider transition-all duration-300 border bg-[#D4AF37]/10 text-[#FFFDD0] border-[#D4AF37] shadow-[0_0_15px_rgba(212,175,55,0.2)]">
          <span>⬛</span><span>MOTHERBOARD</span>
        </button>
        <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center space-x-4 px-4 py-3 rounded-none font-mono text-xs tracking-wider transition-all duration-300 border bg-transparent text-gray-400 border-transparent hover:border-[#D4AF37]/40 hover:text-white">
          <span>⚡</span><span>ARC DASHBOARD</span>
        </button>
        <button onclick="switchView('vault')" id="btn-vault" class="nav-btn w-full flex items-center space-x-4 px-4 py-3 rounded-none font-mono text-xs tracking-wider transition-all duration-300 border bg-transparent text-gray-400 border-transparent hover:border-[#D4AF37]/40 hover:text-white">
          <span>🔱</span><span>THE VAULT</span>
        </button>
        <button onclick="switchView('warroom')" id="btn-warroom" class="nav-btn w-full flex items-center space-x-4 px-4 py-3 rounded-none font-mono text-xs tracking-wider transition-all duration-300 border bg-transparent text-gray-400 border-transparent hover:border-[#D4AF37]/40 hover:text-white relative">
          <span>👁️</span><span>WAR ROOM</span>
          <div class="absolute top-3 right-3 w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        </button>
      </nav>
    </div>

    <div class="mt-8 pt-6 border-t border-[#D4AF37]/20 font-mono text-[11px] text-gray-400 space-y-2">
      <div class="flex justify-between items-center">
        <span>BATTLEZONE STATUS:</span>
        <span class="text-green-500 font-bold tracking-widest flex items-center gap-2"><div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></div> LIVE</span>
      </div>
      <div class="flex justify-between">
        <span>ACTIVE CONDUITS:</span>
        <span class="text-[#D4AF37] font-bold">1,842</span>
      </div>
    </div>
  </aside>

  <main class="flex-1 relative z-10 h-full w-full bg-transparent overflow-hidden">
    
    <div id="view-home" class="app-view active overflow-y-auto p-6 md:p-12 flex flex-col justify-center items-center relative h-full">
      <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#04331d] rounded-full blur-[150px] -z-10"></div>
      
      <div class="max-w-4xl w-full space-y-10 text-center md:text-left">
        <div>
          <h2 class="text-5xl md:text-7xl font-black text-white uppercase tracking-tighter mb-4">Command <span class="text-[#D4AF37]">Center.</span></h2>
          <p class="text-lg text-gray-400 font-mono">All operational protocols and financial conduits are routed through this terminal.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full">
          <div class="bg-[#01140b] border border-[#D4AF37]/50 p-6 shadow-[0_0_15px_rgba(212,175,55,0.1)]">
            <h3 class="text-xs font-mono text-[#D4AF37] uppercase tracking-widest">System Engine</h3>
            <p class="text-2xl font-black text-white mt-2">DASHBOARD</p>
            <button onclick="switchView('dashboard')" class="text-[10px] text-[#FFFDD0] underline mt-4 block font-mono">INITIALIZE →</button>
          </div>
          <div class="bg-[#01140b] border border-[#D4AF37]/50 p-6 shadow-[0_0_15px_rgba(212,175,55,0.1)]">
            <h3 class="text-xs font-mono text-[#D4AF37] uppercase tracking-widest">Protocol Matrix</h3>
            <p class="text-2xl font-black text-white mt-2">THE VAULT</p>
            <button onclick="switchView('vault')" class="text-[10px] text-[#FFFDD0] underline mt-4 block font-mono">UNLOCK →</button>
          </div>
          <div class="bg-[#01140b] border border-[#D4AF37]/50 p-6 shadow-[0_0_15px_rgba(212,175,55,0.1)]">
            <h3 class="text-xs font-mono text-[#D4AF37] uppercase tracking-widest">Live Operators</h3>
            <p class="text-2xl font-black text-green-400 mt-2">WAR ROOM</p>
            <button onclick="switchView('warroom')" class="text-[10px] text-[#FFFDD0] underline mt-4 block font-mono">ENTER TRENCHES →</button>
          </div>
        </div>
      </div>
    </div>

    <div id="view-dashboard" class="app-view">
      <iframe src="https://arc-calculator.vercel.app/" class="app-frame"></iframe>
    </div>

    <div id="view-vault" class="app-view">
      <iframe src="https://arc-vault-live-7plpojxkd-punitsaini252010-rgbs-projects.vercel.app/" class="app-frame"></iframe>
    </div>

    <div id="view-warroom" class="app-view bg-[#011008] flex flex-col h-full">
      <div class="border-b border-[#D4AF37]/30 p-4 bg-[#01140b] shadow-lg flex justify-between items-center z-10">
        <div>
          <h2 class="text-xl font-black text-[#FFFDD0] tracking-widest uppercase">#Operator-Trenches</h2>
        </div>
      </div>

      <div id="chat-feed" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 font-mono pb-20">
        </div>

      <div class="absolute bottom-0 w-full p-4 bg-[#01140b]/95 backdrop-blur-md border-t border-[#D4AF37]/30">
        <form id="chat-form" class="flex space-x-2 max-w-4xl mx-auto">
          <input type="text" id="chat-input" autocomplete="off" placeholder="Drop intelligence here..." class="flex-1 bg-[#021c10] border border-[#D4AF37]/50 text-white font-mono text-sm p-3 focus:outline-none focus:border-[#D4AF37] transition-all" required>
          <button type="submit" class="bg-[#D4AF37] text-black font-black uppercase tracking-widest px-6 hover:bg-white transition-all text-xs">SEND</button>
        </form>
      </div>
    </div>

  </main>

  <script>
    // 1. SPA ROUTING ENGINE (Instant View Switching)
    function switchView(viewId) {
      // Hide all views
      document.querySelectorAll('.app-view').forEach(el => el.classList.remove('active'));
      // Show targeted view instantly
      document.getElementById('view-' + viewId).classList.add('active');
      
      // Reset navigation styles
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.className = "nav-btn w-full flex items-center space-x-4 px-4 py-3 rounded-none font-mono text-xs tracking-wider transition-all duration-300 border bg-transparent text-gray-400 border-transparent hover:border-[#D4AF37]/40 hover:text-white";
      });
      
      // Highlight active navigation
      document.getElementById('btn-' + viewId).className = "nav-btn w-full flex items-center space-x-4 px-4 py-3 rounded-none font-mono text-xs tracking-wider transition-all duration-300 border bg-[#D4AF37]/10 text-[#FFFDD0] border-[#D4AF37] shadow-[0_0_15px_rgba(212,175,55,0.2)]";
    }

    // 2. WAR ROOM AI BOT ENGINE
    const chatFeed = document.getElementById('chat-feed');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');

    const bots = [
      { name: 'Marcus_Ecom', role: 'WHALE', color: 'text-red-400' },
      { name: 'David_Alpha', role: 'ELITE', color: 'text-[#D4AF37]' },
      { name: 'Ghost_Protocol', role: 'OPERATOR', color: 'text-gray-300' },
      { name: 'X_Arbitrage', role: 'ELITE', color: 'text-[#D4AF37]' }
    ];

    const initialHistory = [
      { bot: bots[0], time: "11:42 AM", text: "bro wtf... phase 1 protocol just clicked for me. insane." },
      { bot: bots[2], time: "11:45 AM", text: "fr shit is crazy. speed kills the competition. just executed." },
      { bot: bots[1], time: "11:59 AM", text: "first $800 day using the UI dashboard tools." + 
        "<div class='mt-2 border border-green-500/40 p-2 bg-green-500/10 text-green-400 text-[10px] w-fit rounded'>[STRIPE: +$842.80 CLEARED]</div>" },
      { bot: bots[3], time: "12:02 PM", text: "fuck yeah bro 🔥 keep printing." }
    ];

    function createMessage(name, role, roleColor, time, text, isUser = false) {
      const bg = isUser ? 'bg-[#D4AF37]/10 border-r-2 border-[#D4AF37]' : 'bg-[#01140b]/80 border-l-2 border-[#D4AF37]';
      const align = isUser ? 'ml-auto text-right' : 'mr-auto text-left';
      const flexDir = isUser ? 'flex-row-reverse space-x-reverse' : 'flex-row';
      
      return `
        <div class="p-3 ${bg} space-y-1 mb-2 max-w-[85%] ${align}">
          <div class="flex items-center space-x-2 ${flexDir} text-[10px]">
            <span class="${isUser ? 'text-[#D4AF37]' : 'text-[#FFFDD0]'} font-black">${name}</span>
            <span class="bg-[#021c10] ${roleColor} px-1 border border-gray-700 uppercase font-bold">${role}</span>
            <span class="text-gray-500">${time}</span>
          </div>
          <p class="text-gray-300 text-xs leading-relaxed mt-1">${text}</p>
        </div>
      `;
    }

    function getTime() {
      const d = new Date();
      return (d.getHours()%12||12) + ':' + (d.getMinutes()<10?'0':'') + d.getMinutes() + (d.getHours()>=12?' PM':' AM');
    }

    initialHistory.forEach(msg => {
      chatFeed.innerHTML += createMessage(msg.bot.name, msg.bot.role, msg.bot.color, msg.time, msg.text);
    });
    chatFeed.scrollTop = chatFeed.scrollHeight;

    function botReply(userTxt) {
      const t = userTxt.toLowerCase();
      if(t.includes('how') || t.includes('help') || t.includes('?')) return "bro check the vault tab. it's all mapped out in there.";
      if(t.includes('money') || t.includes('$') || t.includes('win')) return "fuck yeah. scale that shit up 💸";
      if(t.includes('yo') || t.includes('hi')) return "sup bro. volume up.";
      if(t.includes('fuck') || t.includes('shit')) return "lol fr bro. insane.";
      return "facts. don't overthink it just execute.";
    }

    chatForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const txt = chatInput.value.trim();
      if (!txt) return;

      chatFeed.innerHTML += createMessage('YOU', 'INITIATE', 'text-blue-400', getTime(), txt, true);
      chatInput.value = '';
      chatFeed.scrollTop = chatFeed.scrollHeight;

      setTimeout(() => {
        const bot = bots[Math.floor(Math.random() * bots.length)];
        chatFeed.innerHTML += createMessage(bot.name, bot.role, bot.color, getTime(), botReply(txt));
        chatFeed.scrollTop = chatFeed.scrollHeight;
      }, Math.random() * 1500 + 1000);
    });
  </script>
</body>
</html>
